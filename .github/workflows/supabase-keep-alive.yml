name: Supabase Keep-Alive

on:
  schedule:
    - cron: '0 13 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}" \
            "https://kzusibfzntpdjcfmqbon.supabase.co/rest/v1/accounts?limit=1" \
            > /dev/null && echo "Supabase ativo"
